<!-- LÓGICA DE PROGRAMACIÓN INTERACTIVA -->
    <script>
        // --- 1. MENÚ DE CATEGORÍAS ---
        function toggleDropdown() {
            document.getElementById('dropdownMenu').classList.toggle('open');
        }

        function filterCollection(category, categoryName) {
            document.getElementById('dropdownMenu').classList.remove('open');
            document.querySelector('.dropdown-btn').innerHTML = categoryName + ' ▼';

            // Limpiamos buscador si se usa el filtro por categoría
            document.getElementById('searchInput').value = "";

            const sections = document.querySelectorAll('.collection-section');
            sections.forEach(section => {
                if (category === 'todas') {
                    section.style.display = 'block';
                } else {
                    section.style.display = (section.id === category) ? 'block' : 'none';
                }
            });
        }

        // --- 2. BUSCADOR EN TIEMPO REAL ---
        function searchJewels() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.joya-card');
            const sections = document.querySelectorAll('.collection-section');

            // Resetear nombre del botón de colecciones al buscar
            document.querySelector('.dropdown-btn').innerHTML = 'Colecciones ▼';

            sections.forEach(section => {
                let hasVisibleCards = false;
                const sectionCards = section.querySelectorAll('.joya-card');
                
                sectionCards.forEach(card => {
                    const name = card.getAttribute('data-name').toLowerCase();
                    const sku = card.getAttribute('data-sku').toLowerCase();

                    if (name.includes(query) || sku.includes(query)) {
                        card.style.display = 'block';
                        hasVisibleCards = true;
                    } else {
                        card.style.display = 'none';
                    }
                });

                // Si la sección no tiene ningún producto que coincida, se oculta entera
                section.style.display = hasVisibleCards ? 'block' : 'none';
            });
        }

        // --- 3. SISTEMA DEL CARRITO DE COMPRAS ---
        let cart = [];

        function toggleCartPanel() {
            document.getElementById('cartPanel').classList.toggle('open');
        }

        function addToCart(name, sku, price) {
            // Verificar si el producto ya existe en el carrito
            const existingItem = cart.find(item => item.sku === sku);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ name, sku, price, quantity: 1 });
            }
            updateCartUI();
            
            // Abrir automáticamente el panel al agregar para dar feedback visual
            document.getElementById('cartPanel').classList.add('open');
        }

        function removeFromCart(sku) {
            cart = cart.filter(item => item.sku !== sku);
            updateCartUI();
        }

        function updateCartUI() {
            const badge = document.getElementById('cartBadge');
            const itemsContainer = document.getElementById('cartItems');
            const totalContainer = document.getElementById('cartTotal');

            // Actualizar total artículos badge
            const totalItems = cart.reduce((acc, item) => acc + item.quantity, 0);
            badge.innerText = totalItems;

            // Limpiar contenedor de items
            itemsContainer.innerHTML = "";
            let grandTotal = 0;

            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                grandTotal += itemTotal;

                const row = document.createElement('div');
                row.className = 'cart-item';
                row.innerHTML = `
                    <div>
                        <strong>${item.name}</strong> (x${item.quantity})<br>
                        <span style="color:#777; font-size:0.7rem;">${item.sku}</span>
                    </div>
                    <div style="display:flex; align-items:center;">
                        <span>$${itemTotal.toLocaleString('es-CL')}</span>
                        <span class="cart-item-remove" onclick="removeFromCart('${item.sku}')">✕</span>
                    </div>
                `;
                itemsContainer.appendChild(row);
            });

            totalContainer.innerText = `$${grandTotal.toLocaleString('es-CL')}`;
        }

        function sendWhatsAppOrder(event) {
            if (event) event.preventDefault();
            if (cart.length === 0) {
                alert("Tu carrito está vacío. Agrega algunas joyas antes de enviar.");
                return;
            }

            let message = "Hola Joyería Solar! ✨ Me gustaría solicitar las siguientes piezas:\n\n";
            let grandTotal = 0;

            cart.forEach((item, index) => {
                const totalItem = item.price * item.quantity;
                grandTotal += totalItem;
                message += `${index + 1}. 💎 ${item.name}\n   SKU: ${item.sku}\n   Cant: ${item.quantity} x $${item.price.toLocaleString('es-CL')} = $${totalItem.toLocaleString('es-CL')}\n\n`;
            });

            message += `-------------------------\n`;
            message += `💰 TOTAL ORDEN: $${grandTotal.toLocaleString('es-CL')}\n`;
            message += `-------------------------\n`;
            message += `Quedo atento(a) para coordinar el pago y envío. ¡Muchas gracias!`;

            // Codificar el mensaje de forma segura para la URL
            const encodedMessage = encodeURIComponent(message);
            const whatsappUrl = `https://wa.me/56967109265?text=${encodedMessage}`;
            
            // Abrir WhatsApp en pestaña nueva
            window.open(whatsappUrl, '_blank');
        }

        // CERRAR MENÚS AL HACER CLIC AFUERA
        window.onclick = function(event) {
            if (!event.target.matches('.dropdown-btn')) {
                const dropdown = document.getElementById('dropdownMenu');
                if (dropdown.classList.contains('open')) {
                    dropdown.classList.remove('open');
                }
            }
        }

        // --- 4. ESCUCHADOR DE TECLAS (ENTER Y ESC) ---
        document.addEventListener('keydown', function(event) {
            const searchInput = document.getElementById('searchInput');
            const cartPanel = document.getElementById('cartPanel');
            const dropdownMenu = document.getElementById('dropdownMenu');

            // --- TECLA ESCAPE (ESC) ---
            if (event.key === 'Escape' || event.key === 'Esc') {
                // 1. Si la barra de búsqueda tiene foco o texto, se limpia
                if (document.activeElement === searchInput || searchInput.value !== "") {
                    searchInput.value = "";
                    searchJewels(); // Restaura la vista de todos los productos
                    searchInput.blur(); // Quita el foco del buscador
                }

                // 2. Si el carrito está abierto, lo cierra
                if (cartPanel.classList.contains('open')) {
                    cartPanel.classList.remove('open');
                }

                // 3. Si el menú desplegable está abierto, lo cierra
                if (dropdownMenu.classList.contains('open')) {
                    dropdownMenu.classList.remove('open');
                }
            }

            // --- TECLA ENTER ---
            if (event.key === 'Enter') {
                // 1. Si el cliente está escribiendo en la barra de búsqueda, desenfoca el input
                if (document.activeElement === searchInput) {
                    searchInput.blur();
                } 
                // 2. Si el panel del carrito está abierto, envía la orden directamente
                else if (cartPanel.classList.contains('open')) {
                    sendWhatsAppOrder(event);
                }
            }
        });
    </script>
