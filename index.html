<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joyería Solar - Plata 925</title>
    <style>
        :root {
            --bg-cream: #FDFBF7;
            --text-dark: #1A1A1A;
            --gold: #D4AF37;
            --gold-hover: #AA8C2C;
            --card-bg: #FFFFFF;
            --border-color: #E8E2D5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-cream);
            color: var(--text-dark);
            padding-bottom: 60px;
        }

        header {
            background-color: var(--text-dark);
            color: var(--bg-cream);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--gold);
            text-transform: uppercase;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-grow: 1;
            max-width: 600px;
        }

        input[type="text"], select {
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            outline: none;
            font-size: 0.95rem;
        }

        #searchInput {
            flex-grow: 1;
        }

        .cart-btn {
            background-color: var(--gold);
            color: var(--text-dark);
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            transition: background 0.3s;
        }

        .cart-btn:hover {
            background-color: var(--gold-hover);
            color: #fff;
        }

        .cart-count {
            background-color: #d9534f;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 0.8rem;
            margin-left: 5px;
        }

        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }

        .product-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
        }

        .product-id {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 5px;
        }

        .product-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .product-category {
            font-size: 0.85rem;
            color: var(--gold-hover);
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .add-to-cart-btn {
            background-color: var(--text-dark);
            color: var(--bg-cream);
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .add-to-cart-btn:hover {
            background-color: var(--gold);
            color: var(--text-dark);
        }

        /* Panel Carrito */
        #cartPanel {
            position: fixed;
            top: 0;
            right: -350px;
            width: 350px;
            height: 100%;
            background-color: var(--card-bg);
            box-shadow: -2px 0 10px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        #cartPanel.open {
            right: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .close-cart {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .cart-items {
            flex-grow: 1;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .cart-footer {
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }

        .btn-whatsapp {
            width: 100%;
            background-color: #25D366;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo">Joyería Solar</div>
            <div class="controls">
                <input type="text" id="searchInput" placeholder="Buscar joya o código..." oninput="filterProducts()">
                <select id="categorySelect" onchange="filterProducts()">
                    <option value="">Todas las categorías</option>
                    <option value="Anillos">Anillos</option>
                    <option value="Aros Pegados">Aros Pegados</option>
                    <option value="Collares">Collares</option>
                    <option value="Pulsera Hombre">Pulsera Hombre</option>
                    <option value="Packaging">Packaging</option>
                </select>
            </div>
            <button class="cart-btn" onclick="toggleCart()">
                Carrito <span id="cartCount" class="cart-count">0</span>
            </button>
        </div>
    </header>

    <main>
        <div id="productsGrid" class="products-grid"></div>
    </main>

    <!-- Panel Lateral del Carrito -->
    <div id="cartPanel">
        <div class="cart-header">
            <h3>Tu Pedido</h3>
            <button class="close-cart" onclick="toggleCart()">&times;</button>
        </div>
        <div id="cartItems" class="cart-items"></div>
        <div class="cart-footer">
            <div><strong>Total: </strong>$<span id="cartTotal">0</span></div>
            <button class="btn-whatsapp" onclick="sendWhatsAppOrder()">Enviar pedido por WhatsApp</button>
        </div>
    </div>

    <script>
        // LISTADO OFICIAL DE LOS 44 PRODUCTOS
        const catalog = [
            { id: "RING-ANI-001", name: "Solitario", category: "Anillos", price: 9990 },
            { id: "RING-ANI-002", name: "Trebol", category: "Anillos", price: 9990 },
            { id: "RING-ANI-003", name: "Ola Brillante", category: "Anillos", price: 9990 },
            { id: "RING-ANI-004", name: "Corazón Lineado", category: "Anillos", price: 9990 },
            { id: "RING-ANI-005", name: "Corazón Simple", category: "Anillos", price: 9990 },
            { id: "RING-ANI-006", name: "Corazón Partido", category: "Anillos", price: 9990 },
            { id: "RING-ANI-007", name: "Cristales", category: "Anillos", price: 9990 },
            { id: "RING-ANIL-001", name: "Anillo con Halo", category: "Anillos", price: 11990 },
            { id: "RING-ANIL-002", name: "Piedra Celeste", category: "Anillos", price: 11990 },
            { id: "RING-ANIL-003", name: "Piedra Amarilla", category: "Anillos", price: 11990 },
            { id: "RING-ANIL-004", name: "Piedras Brillantes", category: "Anillos", price: 11990 },
            { id: "RING-ANIL-005", name: "Flor Brillante", category: "Anillos", price: 11990 },
            { id: "RING-ANIL-006", name: "Piedra Roja", category: "Anillos", price: 11990 },
            { id: "AR-FEM-001", name: "Piedra Rosada", category: "Aros Pegados", price: 4990 },
            { id: "AR-FEM-002", name: "Corazón Simple", category: "Aros Pegados", price: 4990 },
            { id: "AR-FEM-003", name: "Trebol Pequeño", category: "Aros Pegados", price: 4990 },
            { id: "AR-FEM-004", name: "Perlas Blancas Pequeñas", category: "Aros Pegados", price: 4990 },
            { id: "AR-FEM-005", name: "Triangulos", category: "Aros Pegados", price: 4990 },
            { id: "AR-FEM-006", name: "Guindas", category: "Aros Pegados", price: 4990 },
            { id: "AR-FEM-007", name: "Cristal Transparente", category: "Aros Pegados", price: 4990 },
            { id: "AR-FEM-008", name: "Circon Pequeño", category: "Aros Pegados", price: 4990 },
            { id: "AR-FEM-009", name: "Aros Lamina Color Mariposa", category: "Aros Pegados", price: 7990 },
            { id: "AR-FEM-010", name: "Aros Lamina Color Corazón", category: "Aros Pegados", price: 7990 },
            { id: "AR-FEM-011", name: "Flor Brillante", category: "Aros Pegados", price: 7990 },
            { id: "AR-FEM-012", name: "Perla Brillante", category: "Aros Pegados", price: 6990 },
            { id: "AR-FEM-013", name: "Corazón Colgante", category: "Aros Pegados", price: 6990 },
            { id: "AR-FEM-014", name: "Corazón Brillante", category: "Aros Pegados", price: 6990 },
            { id: "AR-FEM-015", name: "Mariposa Brillante", category: "Aros Pegados", price: 6990 },
            { id: "AR-FEM-016", name: "Flecha Brillante", category: "Aros Pegados", price: 6990 },
            { id: "COL-GAN-001", name: "Osito", category: "Collares", price: 12990 },
            { id: "COL-GAN-002", name: "Corazón Brillante", category: "Collares", price: 12990 },
            { id: "COL-GAN-003", name: "Mariposa Circones Negros", category: "Collares", price: 12990 },
            { id: "COL-GAN-004", name: "Trebol Circones Negros", category: "Collares", price: 12990 },
            { id: "COL-GAN-005", name: "Flor Celeste", category: "Collares", price: 12990 },
            { id: "COL-GAN-006", name: "Corazón Circon Verde", category: "Collares", price: 12990 },
            { id: "COL-GAN-007", name: "Mariposa Bright", category: "Collares", price: 12990 },
            { id: "COL-GAN-008", name: "Flor Bright", category: "Collares", price: 12990 },
            { id: "COL-GAN-009", name: "Punto Rojo", category: "Collares", price: 12990 },
            { id: "COL-GAN-010", name: "Llave de Corazón", category: "Collares", price: 12990 },
            { id: "PUL-HOM-001", name: "Pulsera Gucci", category: "Pulsera Hombre", price: 9990 },
            { id: "PUL-HOM-002", name: "Fígaro", category: "Pulsera Hombre", price: 9990 },
            { id: "PUL-HOM-003", name: "Gucci 3x1", category: "Pulsera Hombre", price: 9990 },
            { id: "PUL-HOM-004", name: "Turbillon", category: "Pulsera Hombre", price: 9990 },
            { id: "CAJ-PEQ-001", name: "Caja Pequeña", category: "Packaging", price: 500 },
            { id: "CAJ-GRA-001", name: "Caja Grande", category: "Packaging", price: 1000 }
        ];

        let cart = [];

        function renderProducts(products) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            products.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card">
                        <div>
                            <div class="product-id">${p.id}</div>
                            <div class="product-title">${p.name}</div>
                            <div class="product-category">${p.category}</div>
                            <div class="product-price">$${p.price.toLocaleString('es-CL')}</div>
                        </div>
                        <button class="add-to-cart-btn" onclick="addToCart('${p.id}')">Agregar al carrito</button>
                    </div>
                `;
            });
        }

        function filterProducts() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categorySelect').value;

            const filtered = catalog.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(query) || p.id.toLowerCase().includes(query);
                const matchesCategory = category === "" || p.category === category;
                return matchesSearch && matchesCategory;
            });

            renderProducts(filtered);
        }

        function addToCart(id) {
            const product = catalog.find(p => p.id === id);
            cart.push(product);
            updateCart();
        }

        function updateCart() {
            document.getElementById('cartCount').innerText = cart.length;
            const itemsContainer = document.getElementById('cartItems');
            itemsContainer.innerHTML = '';
            
            let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                itemsContainer.innerHTML += `
                    <div class="cart-item">
                        <div>
                            <strong>${item.name}</strong><br>
                            <small>${item.id} - $${item.price.toLocaleString('es-CL')}</small>
                        </div>
                        <button onclick="removeFromCart(${index})" style="background:none;border:none;color:red;cursor:pointer;">&times;</button>
                    </div>
                `;
            });

            document.getElementById('cartTotal').innerText = total.toLocaleString('es-CL');
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function toggleCart() {
            document.getElementById('cartPanel').classList.toggle('open');
        }

        function sendWhatsAppOrder() {
            if(cart.length === 0) {
                alert("El carrito está vacío.");
                return;
            }
            let text = "Hola, me gustaría pedir los siguientes productos de Joyería Solar:\n\n";
            let total = 0;
            cart.forEach(item => {
                text += `- ${item.name} (${item.id}): $${item.price.toLocaleString('es-CL')}\n`;
                total += item.price;
            });
            text += `\n*Total:* $${total.toLocaleString('es-CL')}`;
            
            const encodedText = encodeURIComponent(text);
            // Reemplaza con tu número de teléfono si es necesario
            window.open(`https://wa.me/?text=${encodedText}`, '_blank');
        }

        // SISTEMA DE ATENCIÓN DE TECLAS (ESC Y ENTER)
        document.addEventListener('keydown', function(event) {
            const searchInput = document.getElementById('searchInput');
            const cartPanel = document.getElementById('cartPanel');

            if (event.key === 'Escape' || event.key === 'Esc') {
                if (searchInput && (document.activeElement === searchInput || searchInput.value !== "")) {
                    searchInput.value = "";
                    filterProducts();
                    searchInput.blur();
                }
                if (cartPanel && cartPanel.classList.contains('open')) {
                    cartPanel.classList.remove('open');
                }
            }

            if (event.key === 'Enter') {
                if (searchInput && document.activeElement === searchInput) {
                    searchInput.blur();
                } else if (cartPanel && cartPanel.classList.contains('open')) {
                    sendWhatsAppOrder();
                }
            }
        });

        // Inicializar catálogo al cargar
        renderProducts(catalog);
    </script>
</body>
</html>
